<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
      color: aliceblue;
    }

    .attribution a {
      color: hsl(194, 100%, 53%);
    }
  </style>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/card.css">
</head>

<body>
  <section class="card">
    <div class="card__img">
      <img class="img__display" src="./images/image-equilibrium.jpg" alt="NFT img">
      <img class="img__view" src="./images/icon-view.svg" alt="view icon">
    </div>
    <div class="card__info">
      <h2 class="card__name">Equilibrium #3429</h2>
      <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="card__buy">
        <p class="buy__ETH">
          <img src="./images/icon-ethereum.svg" alt="ETH icon">
          0.041 ETH
        </p>
        <p class="buy__time">
          <img src="./images/icon-clock.svg" alt="clock icon">
          3 days left
        </p>
      </div>
    </div>

    <div class="card__creator">
      <img class="creator__avatar" src="./images/image-avatar.png" alt="creator image">
      <p class="creator__credit">Creation of
      <p class="creator__name">Jules Wyvern</p>
      </p>
    </div>
  </section>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/Tadataka-Rei">Tevel</a>.
  </footer>
</body>

</html>
